<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="HIMLoco tensor flow">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}
      .core{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:12}
      .critic{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:12}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:24px;fill:#0f172a}
      .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:18px;fill:#475569}
      .line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="25" y="25" width="1150" height="380" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="18"/>
  <rect class="box" x="70" y="85" width="210" height="90"/>
  <text class="text" x="175" y="122" text-anchor="middle">历史观测</text>
  <text class="small" x="175" y="152" text-anchor="middle">45 x 6 = 270</text>
  <rect class="core" x="355" y="85" width="230" height="90"/>
  <text class="text" x="470" y="122" text-anchor="middle">HIMEstimator</text>
  <text class="small" x="470" y="152" text-anchor="middle">encoder / target / proto</text>
  <rect class="box" x="665" y="55" width="210" height="70"/>
  <text class="text" x="770" y="88" text-anchor="middle">估计速度 3 维</text>
  <rect class="box" x="665" y="150" width="210" height="70"/>
  <text class="text" x="770" y="193" text-anchor="middle">latent 16 维</text>
  <rect class="box" x="355" y="260" width="230" height="80"/>
  <text class="text" x="470" y="292" text-anchor="middle">当前观测</text>
  <text class="small" x="470" y="320" text-anchor="middle">one-step obs 45</text>
  <rect class="core" x="945" y="105" width="190" height="100"/>
  <text class="text" x="1040" y="145" text-anchor="middle">Actor MLP</text>
  <text class="small" x="1040" y="176" text-anchor="middle">64 -> action 12</text>
  <rect class="critic" x="70" y="265" width="210" height="75"/>
  <text class="text" x="175" y="295" text-anchor="middle">privileged obs</text>
  <text class="small" x="175" y="322" text-anchor="middle">238 -> critic value</text>
  <path class="line" d="M 280 130 L 348 130"/>
  <path class="line" d="M 585 130 C 620 130 625 90 657 90"/>
  <path class="line" d="M 585 130 C 620 130 625 185 657 185"/>
  <path class="line" d="M 875 90 C 905 90 915 126 938 140"/>
  <path class="line" d="M 875 185 C 905 185 915 172 938 166"/>
  <path class="line" d="M 585 300 C 760 300 790 205 938 180"/>
  <path class="line" d="M 280 303 L 340 303"/>
  <text class="small" x="330" y="382">Actor 部署时不读取 privileged obs；critic 和 estimator 训练时利用仿真真值。</text>
</svg>
